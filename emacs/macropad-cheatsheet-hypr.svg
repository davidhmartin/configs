  <rect x="24" y="214" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
  <text x="32" y="229" fill="#8000ff" font-size="10px" font-family="monospace">H-e</text>
