  <text x="24"  y="850" fill="#8000ff" font-size="12px" font-family="monospace">H-p</text>
  <text x="70"  y="850" fill="#e0e0e0" font-size="12px" font-family="monospace">consult-imenu</text>
  <text x="290" y="850" fill="#aaa" font-size="12px" font-family="monospace">Jump to symbol in buffer</text>
