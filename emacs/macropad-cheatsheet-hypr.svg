  <text x="225.0" y="242.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="12px" font-family="monospace">↑ begin-</text>
  <text x="225.0" y="260.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="12px" font-family="monospace">defun</text>
