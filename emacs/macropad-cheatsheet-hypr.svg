  <text x="361.0" y="422.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="12px" font-family="monospace">find</text>
  <rect x="432" y="376" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
