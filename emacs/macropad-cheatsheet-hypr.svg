  <text x="24"  y="706" fill="#8000ff" font-size="12px" font-family="monospace">H-h</text>
  <text x="70"  y="706" fill="#e0e0e0" font-size="12px" font-family="monospace">consult-imenu-multi</text>
  <text x="290" y="706" fill="#aaa" font-size="12px" font-family="monospace">imenu of all buffers in project</text>
  <text x="24"  y="724" fill="#8000ff" font-size="12px" font-family="monospace">H-i</text>
