  <text x="24"  y="778" fill="#8000ff" font-size="12px" font-family="monospace">H-l</text>
  <text x="70"  y="778" fill="#e0e0e0" font-size="12px" font-family="monospace">consult-imenu</text>
  <text x="290" y="778" fill="#aaa" font-size="12px" font-family="monospace">Jump to symbol in buffer</text>
  <text x="24"  y="796" fill="#8000ff" font-size="12px" font-family="monospace">H-m</text>
  <text x="70"  y="796" fill="#e0e0e0" font-size="12px" font-family="monospace">deadgrep</text>
  <text x="290" y="796" fill="#aaa" font-size="12px" font-family="monospace">Persistent ripgrep search buffer</text>
  <text x="24"  y="814" fill="#8000ff" font-size="12px" font-family="monospace">H-n</text>
  <text x="70"  y="814" fill="#e0e0e0" font-size="12px" font-family="monospace">consult-ripgrep</text>
  <text x="290" y="814" fill="#aaa" font-size="12px" font-family="monospace">Quick project-wide text search</text>
  <text x="24"  y="832" fill="#8000ff" font-size="12px" font-family="monospace">H-o</text>
  <text x="70"  y="832" fill="#e0e0e0" font-size="12px" font-family="monospace">consult-find</text>
