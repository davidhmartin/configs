  <text x="24"  y="598" fill="#8000ff" font-size="12px" font-family="monospace">H-b</text>
  <text x="70"  y="598" fill="#e0e0e0" font-size="12px" font-family="monospace">ibuffer</text>
  <text x="290" y="598" fill="#aaa" font-size="12px" font-family="monospace">Open buffer list</text>
  <text x="24"  y="616" fill="#8000ff" font-size="12px" font-family="monospace">H-c</text>
  <text x="70"  y="616" fill="#e0e0e0" font-size="12px" font-family="monospace">dired</text>
  <text x="290" y="616" fill="#aaa" font-size="12px" font-family="monospace">Open directory editor</text>
  <text x="24"  y="634" fill="#8000ff" font-size="12px" font-family="monospace">H-d</text>
  <text x="70"  y="634" fill="#e0e0e0" font-size="12px" font-family="monospace">next-buffer</text>
  <text x="290" y="634" fill="#aaa" font-size="12px" font-family="monospace">Switch to next buffer</text>
  <text x="24"  y="652" fill="#8000ff" font-size="12px" font-family="monospace">H-e</text>
  <text x="70"  y="652" fill="#e0e0e0" font-size="12px" font-family="monospace">er/expand-region</text>
  <text x="290" y="652" fill="#aaa" font-size="12px" font-family="monospace">Expand selection outward</text>
  <text x="24"  y="670" fill="#8000ff" font-size="12px" font-family="monospace">H-f</text>
  <text x="70"  y="670" fill="#e0e0e0" font-size="12px" font-family="monospace">treesit-beginning-of-defun</text>
