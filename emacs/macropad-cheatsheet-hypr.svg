  <text x="32" y="148" fill="#8000ff" font-size="10px" font-family="monospace">H-a</text>
  <text x="89.0" y="170.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="13px" font-family="monospace">prev-buffer</text>
  <rect x="160" y="133" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
  <text x="168" y="148" fill="#8000ff" font-size="10px" font-family="monospace">H-b</text>
  <text x="225.0" y="170.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="13px" font-family="monospace">ibuffer</text>
  <rect x="296" y="133" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
  <text x="304" y="148" fill="#8000ff" font-size="10px" font-family="monospace">H-c</text>
  <text x="361.0" y="170.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="13px" font-family="monospace">dired</text>
  <rect x="432" y="133" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
  <text x="440" y="148" fill="#8000ff" font-size="10px" font-family="monospace">H-d</text>
  <text x="497.0" y="170.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="13px" font-family="monospace">next-buffer</text>

