  <text x="440" y="229" fill="#8000ff" font-size="10px" font-family="monospace">H-h</text>
  <text x="497.0" y="251.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="13px" font-family="monospace">imenu-multi</text>

  <!-- Row 3 -->
  <rect x="24" y="295" width="130" height="75" rx="6" fill="#2d2d2d" stroke="#8000ff" stroke-width="1.5"/>
  <text x="32" y="310" fill="#8000ff" font-size="10px" font-family="monospace">H-i</text>
  <text x="89.0" y="323.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="12px" font-family="monospace">← back-</text>
  <text x="89.0" y="341.5" text-anchor="middle" dominant-baseline="central" fill="#e0e0e0" font-size="12px" font-family="monospace">sexp</text>
